<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Esencia & Cristal</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:linear-gradient(180deg,#2f4a3c,#5b7a66);

font-family:'Montserrat',sans-serif;

display:flex;

justify-content:center;

align-items:center;

min-height:100vh;

padding:30px;

}

.tarjeta{

background:white;

width:700px;

max-width:95%;

padding:60px;

border-radius:30px;

box-shadow:0 20px 50px rgba(0,0,0,.25);

text-align:center;

}

h1{

font-family:'Cormorant Garamond',serif;

font-size:60px;

color:#3f5d48;

margin-bottom:10px;

}

h2{

font-family:'Cormorant Garamond',serif;

font-weight:400;

font-style:italic;

color:#7b8d80;

margin-bottom:35px;

}

p{

font-size:18px;

line-height:1.8;

color:#555;

margin-bottom:40px;

}

button{

background:#4e7057;

color:white;

border:none;

padding:18px 40px;

font-size:18px;

border-radius:50px;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#35513d;

transform:scale(1.05);

}

</style>

</head>

<body>

<div class="tarjeta">

<h1>Esencia & Cristal</h1>

<h2>Un viaje para escuchar el mensaje de tu alma</h2>

<p>

Cada aceite esencial y cada cristal guardan una frecuencia.

Respira profundo, sigue tu intuición y permite que este recorrido te revele el mensaje que hoy necesitas recibir.

</p>

<button>

Comenzar experiencia

</button>

</div>

</body>

</html>
